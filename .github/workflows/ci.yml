name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yge
          POSTGRES_PASSWORD: yge_dev_password
          POSTGRES_DB: yge_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @yge/db prisma generate
      - run: pnpm --filter @yge/db prisma migrate deploy
        env:
          DATABASE_URL: postgresql://yge:yge_dev_password@localhost:5432/yge_dev?schema=public
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
