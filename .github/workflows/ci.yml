name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yge
          POSTGRES_PASSWORD: yge_dev_password
          POSTGRES_DB: yge_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # NOTE: must use `exec` so pnpm runs the prisma CLI binary instead of
      # looking for a package script named "prisma". Bare
      # `pnpm --filter @yge/db prisma generate` silently exits 0 with
      # "None of the selected packages has a 'prisma' script", which means
      # the Prisma client never gets generated and every downstream typecheck
      # fails with "Module '@prisma/client' has no exported member …".
      - run: pnpm --filter @yge/db exec prisma generate
      - run: pnpm --filter @yge/db exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://yge:yge_dev_password@localhost:5432/yge_dev?schema=public
      - run: pnpm typecheck
      # Lint disabled for now — repo doesn't have an ESLint config yet, so
      # `eslint .` fails with "No files matching the pattern '.' were found"
      # in packages that have no js. Re-enable after adding eslint.config.js.
      # - run: pnpm lint
      - run: pnpm test
