<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YGE Auto Form Filler</title>
    <style>
      body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 12px; min-width: 320px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
      button { padding: 4px 10px; font-size: 12px; cursor: pointer; }
      .matches { margin-top: 8px; max-height: 280px; overflow-y: auto; }
      .match { padding: 6px; border: 1px solid #ddd; border-radius: 4px; margin: 4px 0; font-size: 12px; }
      .match .label { font-weight: 600; }
      .match .value { font-family: ui-monospace, SFMono-Regular, monospace; color: #333; word-break: break-all; }
      .match .reasons { color: #666; font-size: 11px; margin-top: 2px; }
      .empty { color: #888; font-style: italic; }
      .err { color: #b91c1c; padding: 6px; background: #fee; border: 1px solid #fcc; border-radius: 4px; margin: 6px 0; }
      .ok { color: #064e3b; padding: 6px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 4px; margin: 6px 0; }
    </style>
  </head>
  <body>
    <h1>YGE Auto Form Filler</h1>
    <div id="status"></div>
    <div class="row">
      <button id="scan">Scan this page</button>
      <button id="apply" disabled>Apply</button>
      <button id="options" style="margin-left: auto;">Settings</button>
    </div>
    <div id="matches" class="matches"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
