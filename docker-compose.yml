services:
  postgres:
    image: postgres:16-alpine
    container_name: yge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yge
      POSTGRES_PASSWORD: yge_dev_password
      POSTGRES_DB: yge_dev
    ports:
      - "5432:5432"
    volumes:
      - yge-postgres-data:/var/lib/postgresql/data

volumes:
  yge-postgres-data:
